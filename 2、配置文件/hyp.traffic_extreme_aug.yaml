# 第六组-交通场景数据增强与训练超参数
lr0: 0.01            # 初始学习率
lrf: 0.2             # 最终学习率余弦衰减系数
momentum: 0.937      # 动量因子
weight_decay: 0.0005 # 权重衰减系数
warmup_epochs: 3.0   # 热身轮数
warmup_momentum: 0.8 # 热身初始动量
warmup_bias_lr: 0.1  # 热身偏置学习率
box: 0.05            # iou损失增益
cls: 0.5             # 分类损失增益
cls_pw: 1.0          # 分类正样本权重
obj: 1.5             # 物体置信度损失增益
obj_pw: 1.5          # 物体置信度正样本权重
iou_t: 0.20          # 标签与锚框的IoU匹配门槛
anchor_t: 4.0        # 锚框长宽比门槛
fl_gamma: 2.0        # Focal Loss
hsv_h: 0.015         # 色调偏移
hsv_s: 0.7           # 饱和度增强
hsv_v: 0.4           # 亮度环境增强
degrees: 5.0          # 随机旋转角度 (±5°)
translate: 0.1       # 随机平移范围 (±10%)
scale: 0.5           # 随机缩放比例 (50%)
shear: 2.0           # 随机剪切角 (±2°)
perspective: 0.0     # 透视变形
flipud: 0.0          # 上下翻转概率
fliplr: 0.5          # 左右翻转概率 (50%)
mosaic: 1.0          # 100% 触发马赛克增强
mixup: 0             #关闭MixUp图像混叠增强
copy_paste: 0.0      # 复制粘贴增强
